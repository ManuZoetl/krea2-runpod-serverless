name: Build and Push Krea 2 to GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. FEHLERBEHEBUNG: Nutzung der korrekten, existierenden Free-Disk-Space Action
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase repository name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # 2. Modell-Download direkt auf den bereinigten Runner ausführen
      - name: Install Python dependencies on Runner
        run: pip3 install huggingface_hub

      - name: Download Krea 2 Weights directly to Runner Workspace
        run: |
          mkdir -p ./models/krea2
          python3 -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='krea/Krea-2-Turbo',
              local_dir='./models/krea2',
              token='${{ secrets.HF_TOKEN }}'
          )
          "

      # 3. Bei der GitHub Container Registry anmelden
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Standard Docker Build & Push ausführen (Kein temporärer Download-Overhead in Docker!)
      - name: Build and Push Image
        run: |
          docker build \
            --no-cache \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
