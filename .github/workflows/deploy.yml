name: Build and Push Krea 2 to GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Aggressivste Linux-Bereinigung, um das Root-System maximal zu leeren
      - name: Free Disk Space (Ubuntu)
        uses: skx/github-action-free-disk-space@main
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase repository name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # 2. Modell-Download außerhalb von Docker auf dem Runner ausführen
      - name: Install Python dependencies on Runner
        run: pip3 install huggingface_hub

      - name: Download Krea 2 Weights directly to Runner Workspace
        run: |
          mkdir -p ./models/krea2
          python3 -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='krea/Krea-2-Turbo',
              local_dir='./models/krea2',
              token='${{ secrets.HF_TOKEN }}'
          )
          "

      # 3. Bei der GitHub Container Registry anmelden
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Standard Docker Build & Push ausführen (Docker muss nichts mehr downloaden!)
      - name: Build and Push Image
        run: |
          docker build \
            --no-cache \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
