name: Build and Push Krea 2 to GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Festplatte maximal vergrößern (~35-40 GB freischaufeln)
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # 2. Code auschecken
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase repository name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # 3. FEHLERBEHEBUNG: Richtige Syntax für Inline-Konfiguration & Treiber-Wechsel
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Nutzt den isolierten Container-Treiber, der die große Partition voll ausnutzt
          driver: docker-container
          # Korrigiertes Feld für den Text-Block (config-inline statt buildkitd-config)
          config-inline: |
            [worker.oci]
              max-parallelism = 1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Image bauen (Ohne GHA-Cache, um Platz zu sparen)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          no-cache: true
