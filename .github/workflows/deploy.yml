name: Build and Push Krea 2 to GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Festplatte maximal vergrößern und auf /mnt mounten
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # 2. Code auschecken
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase repository name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # 3. Docker-Daemon stoppen und auf die große /mnt Partition verschieben
      - name: Move Docker Storage to Large Partition
        run: |
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker
          sudo rsync -aqxP /var/lib/docker/ /mnt/docker/
          echo '{"data-root": "/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          docker info | grep "Docker Root Dir"

      # 4. Bei der GitHub Container Registry anmelden
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Natives Docker Build und Push ausführen
      - name: Build and Push Image Natively
        run: |
          docker build \
            --no-cache \
            --build-arg HF_TOKEN="${{ secrets.HF_TOKEN }}" \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
